<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>團體訂餐記帳</title>
<style>
  :root{
    --bg:#f5f5f7; --card:#fff; --primary:#ff6b35; --primary-dark:#e0551f;
    --text:#1d1d1f; --muted:#86868b; --border:#e5e5ea;
    --pos:#2fa84f; --neg:#e0392b;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);}
  header{background:var(--primary);color:#fff;padding:16px 20px;position:sticky;top:0;z-index:10;box-shadow:0 2px 6px rgba(0,0,0,.1);}
  header h1{margin:0;font-size:18px;}
  .container{max-width:640px;margin:0 auto;padding:16px;}
  .tabs{display:flex;gap:8px;margin-bottom:16px;}
  .tab{flex:1;text-align:center;padding:10px;border-radius:10px;background:var(--card);border:1px solid var(--border);cursor:pointer;font-size:14px;font-weight:600;color:var(--muted);}
  .tab.active{background:var(--primary);color:#fff;border-color:var(--primary);}
  .card{background:var(--card);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
  .card h2{margin:0 0 12px;font-size:15px;}
  input,select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;font-size:15px;margin-bottom:10px;background:#fafafa;}
  input[type="date"]{
    width:100%;
    min-width:0;
    box-sizing:border-box;
    -webkit-appearance:none;
    appearance:none;
  }
  select{
    -webkit-appearance:none;
    appearance:none;
    background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%2386868b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>');
    background-repeat:no-repeat;
    background-position:right 12px center;
    background-size:16px;
    padding-right:36px;
  }
  table{ table-layout: fixed; }
  td{ overflow: hidden; }
  label{font-size:13px;color:var(--muted);display:block;margin-bottom:4px;}
  button{background:var(--primary);color:#fff;border:none;border-radius:10px;padding:11px 16px;font-size:15px;font-weight:600;cursor:pointer;width:100%;}
  button:active{background:var(--primary-dark);}
  button.secondary{background:#efeff0;color:var(--text);}
  button.small{width:auto;padding:6px 12px;font-size:13px;}
  .row{display:flex;gap:8px;align-items:center;}
  .share-item{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
  .share-item input[type=number]{margin-bottom:0;}
  .share-item .amt-input{
    text-align:center;
    height:44px;
    padding-top:0;
    padding-bottom:0;
    box-sizing:border-box;
  }
  /* iOS keeps its own vertical padding on native <select> no matter what
     height/padding CSS says, so the real select is stretched invisibly over
     a plain div that we fully control — guarantees the same height as
     .amt-input regardless of native form-control quirks. */
  .share-item .name-input-shell{position:relative;width:100%;height:44px;}
  .share-item .name-input-shell select.name-input{
    position:absolute;inset:0;width:100%;height:100%;
    opacity:0;margin:0;padding:0;border:none;z-index:2;
  }
  .share-item .name-input-fake{
    height:44px;padding:0 34px 0 12px;border:1px solid var(--border);border-radius:10px;
    background:#fafafa;box-sizing:border-box;
    display:flex;align-items:center;justify-content:center;
    font-size:15px;color:var(--text);
    background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%2386868b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>');
    background-repeat:no-repeat;background-position:right 12px center;background-size:16px;
    pointer-events:none;z-index:1;
  }
  .share-item .name-input-fake.placeholder{color:var(--muted);}
  .balance-list .b-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
  .balance-list .b-row:last-child{border-bottom:none;}
  .amt-pos{color:var(--pos);font-weight:700;}
  .amt-neg{color:var(--neg);font-weight:700;}
  .amt-zero{color:var(--muted);font-weight:600;}
  .meal-item{border-bottom:1px solid var(--border);padding:12px 0;}
  .meal-item:last-child{border-bottom:none;}
  .meal-title{font-weight:700;font-size:15px;display:flex;justify-content:space-between;}
  .meal-meta{font-size:13px;color:var(--muted);margin-top:2px;}
  .meal-shares{margin-top:8px;font-size:13px;}
  .meal-shares span{display:inline-block;background:#f0f0f2;border-radius:8px;padding:3px 8px;margin:2px 4px 2px 0;}
  .del-btn{color:var(--neg);background:none;border:none;font-size:13px;width:auto;padding:0;font-weight:600;}
  .empty{color:var(--muted);text-align:center;padding:24px 0;font-size:14px;}
  .settle-hint{font-size:13px;color:var(--muted);margin-top:6px;}
  #configScreen{max-width:480px;margin:40px auto;padding:20px;}
  #configScreen textarea{width:100%;height:120px;font-family:monospace;font-size:13px;padding:10px;border-radius:10px;border:1px solid var(--border);}
  .hidden{display:none !important;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:100;}
  .toast.show{opacity:1;}
</style>
</head>
<body>

<div id="configScreen" class="hidden">
  <h2>首次設定 — 貼上 Firebase 設定</h2>
  <p style="font-size:13px;color:var(--muted)">到 Firebase 主控台 → 專案設定 → 你的應用程式，複製 firebaseConfig 物件貼在下面（只需做一次，之後會存在瀏覽器裡）。</p>
  <textarea id="configInput" placeholder='{"apiKey":"...","authDomain":"...","projectId":"...","storageBucket":"...","messagingSenderId":"...","appId":"..."}'></textarea>
  <button onclick="saveConfig()" style="margin-top:10px;">儲存並啟動</button>
</div>

<div id="app">
<header><h1>🍱 團體訂餐記帳</h1></header>
<div class="container">
  <div class="tabs">
    <div class="tab active" data-tab="add" onclick="switchTab('add')">新增訂餐</div>
    <div class="tab" data-tab="balance" onclick="switchTab('balance')">結算</div>
    <div class="tab" data-tab="history" onclick="switchTab('history')">紀錄</div>
  </div>

  <!-- ADD -->
  <div id="tab-add">
    <div class="card">
      <h2>本次訂餐</h2>
      <label>日期</label>
      <input type="date" id="mealDate">
      <label>備註（例如：便當、飲料）</label>
      <input type="text" id="mealNote" placeholder="例如：晚餐便當">
      <label>誰先付錢（代墊人）</label>
      <select id="payerSelect"></select>
      <div class="row" style="margin-bottom:10px;">
        <input type="text" id="newMemberName" placeholder="新成員姓名（可選，加入常用名單）">
        <button class="small secondary" style="flex-shrink:0;" onclick="addNewMember()">加入名單</button>
      </div>
    </div>

    <div class="card">
      <h2>成員與金額</h2>
      <div id="sharesList"></div>
      <button class="secondary" style="margin-bottom:10px;" onclick="addShareRow()">＋ 新增成員金額</button>
      <div style="text-align:right;font-size:14px;margin-bottom:10px;">總金額：<b id="totalPreview">$0</b></div>
      <button id="submitBtn" onclick="submitMeal()">儲存這筆訂餐</button>
      <button id="cancelEditBtn" class="secondary hidden" style="margin-top:8px;" onclick="cancelEdit()">取消編輯</button>
    </div>
  </div>

  <!-- BALANCE -->
  <div id="tab-balance" class="hidden">
    <div class="card">
      <h2>目前餘額（正值＝該收錢，負值＝該付錢）</h2>
      <div id="balanceList" class="balance-list"><div class="empty">尚無資料</div></div>
    </div>
    <div class="card">
      <div class="row" style="justify-content:space-between;margin-bottom:12px;">
        <h2 style="margin:0;">還款紀錄</h2>
        <button class="small secondary" style="flex-shrink:0;width:auto;" onclick="changePin()">🔒 設定/變更確認碼</button>
      </div>
      <div id="settleHistoryList"><div class="empty">尚無還款紀錄</div></div>
    </div>
  </div>

  <!-- HISTORY -->
  <div id="tab-history" class="hidden">
    <div class="card">
      <h2>訂餐紀錄</h2>
      <div id="historyList"><div class="empty">尚無紀錄</div></div>
    </div>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, updateDoc, deleteDoc, doc,
  onSnapshot, query, orderBy, serverTimestamp, getDoc, setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let app, db;
let members = [];      // [{id?, name}] — stored simply as name strings in localStorage cache
let meals = [];         // live from Firestore
let settlements = [];   // live from Firestore — records of debts marked as repaid
let editingMealId = null; // set while the add-meal form is editing an existing meal

const $ = (id) => document.getElementById(id);

function toast(msg){
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

// ---------- Config bootstrap ----------
function saveConfig(){
  const raw = $('configInput').value.trim();
  try{
    const cfg = JSON.parse(raw);
    localStorage.setItem('mealTrackerFirebaseConfig', JSON.stringify(cfg));
    startApp(cfg);
  }catch(e){
    alert('JSON 格式錯誤，請確認貼上的是完整的 firebaseConfig 物件');
  }
}
window.saveConfig = saveConfig;

function startApp(cfg){
  app = initializeApp(cfg);
  db = getFirestore(app);
  $('configScreen').classList.add('hidden');
  $('app').classList.remove('hidden');
  $('mealDate').value = new Date().toISOString().slice(0,10);
  loadMembers();
  listenMeals();
  listenSettlements();
  addShareRow(); addShareRow();
}

const firebaseConfig = {
  apiKey: "AIzaSyDbc-2ALGa9nQ_5svtHf8R3nFUm1vdtLe4",
  authDomain: "meal-tracker-633fd.firebaseapp.com",
  projectId: "meal-tracker-633fd",
  storageBucket: "meal-tracker-633fd.firebasestorage.app",
  messagingSenderId: "394112675982",
  appId: "1:394112675982:web:42c541c3e0037fec6319df"
};
startApp(firebaseConfig);

// ---------- Members (cached locally, simple name list) ----------
function loadMembers(){
  const raw = localStorage.getItem('mealTrackerMembers');
  members = raw ? JSON.parse(raw) : [];
  refreshMemberUI();
}
function saveMembers(){
  localStorage.setItem('mealTrackerMembers', JSON.stringify(members));
}
function addMemberIfNew(name){
  if(members.includes(name)) return false;
  members.push(name);
  saveMembers();
  refreshMemberUI();
  return true;
}

function addNewMember(){
  const name = $('newMemberName').value.trim();
  if(!name) return;
  if(addMemberIfNew(name)) toast('已加入常用名單：'+name);
  $('payerSelect').value = name;
  $('newMemberName').value = '';
}
window.addNewMember = addNewMember;

function refreshMemberUI(){
  const payerSelect = $('payerSelect');
  payerSelect.innerHTML = members.map(m=>`<option value="${m}">${m}</option>`).join('') || '<option value="">（請先新增成員）</option>';
  document.querySelectorAll('.share-item .name-input').forEach(sel=>{
    const cur = sel.value;
    sel.innerHTML = memberOptionsHtml(cur);
    syncNameFake(sel);
  });
}
function memberOptionsHtml(selected){
  let opts = '<option value="">選擇成員</option>';
  opts += members.map(m=>`<option value="${m}" ${m===selected?'selected':''}>${m}</option>`).join('');
  opts += '<option value="__new__">＋ 新增成員…</option>';
  return opts;
}

// The visible box next to each select is a plain div kept in sync with the
// real (invisibly stretched) select, so its height is never at the mercy of
// the native form control's own rendering.
function syncNameFake(sel){
  const fake = sel.nextElementSibling;
  if(!fake) return;
  const val = sel.value;
  fake.textContent = val || '選擇成員';
  fake.classList.toggle('placeholder', !val);
}

// Share-row select has an inline "+ 新增成員" option so a name can be
// added straight from this row instead of scrolling back up to the payer card.
function onShareNameChange(sel){
  if(sel.value === '__new__'){
    const input = prompt('請輸入新成員姓名：');
    const name = (input||'').trim();
    if(!name){ sel.value=''; syncNameFake(sel); return; }
    if(addMemberIfNew(name)) toast('已加入常用名單：'+name);
    sel.value = name;
  }
  syncNameFake(sel);
}
window.onShareNameChange = onShareNameChange;

// ---------- Share rows ----------
function addShareRow(name='', amount=''){
  const div = document.createElement('div');
  div.className = 'share-item';
  div.innerHTML = `
    <div class="name-input-shell">
      <select class="name-input" onchange="onShareNameChange(this)">${memberOptionsHtml(name)}</select>
      <div class="name-input-fake"></div>
    </div>
    <input type="number" class="amt-input" placeholder="金額" value="${amount}" oninput="updateTotalPreview()">
    <button class="del-btn" onclick="this.parentElement.remove(); updateTotalPreview();">刪除</button>
  `;
  $('sharesList').appendChild(div);
  syncNameFake(div.querySelector('.name-input'));
  updateTotalPreview();
}
window.addShareRow = addShareRow;

function updateTotalPreview(){
  let total = 0;
  document.querySelectorAll('.amt-input').forEach(i=>{ total += parseFloat(i.value)||0; });
  $('totalPreview').textContent = '$' + total.toFixed(0);
}
window.updateTotalPreview = updateTotalPreview;

// ---------- Submit meal ----------
async function submitMeal(){
  const date = $('mealDate').value;
  const note = $('mealNote').value.trim();
  const payer = $('payerSelect').value;
  if(!payer){ alert('請選擇代墊人'); return; }

  const shares = [];
  document.querySelectorAll('.share-item').forEach(row=>{
    const name = row.querySelector('.name-input').value.trim();
    const amt = parseFloat(row.querySelector('.amt-input').value);
    if(name && amt>0){
      shares.push({name, amount: amt});
      addMemberIfNew(name);
    }
  });
  if(shares.length===0){ alert('請至少輸入一筆成員金額'); return; }

  const total = shares.reduce((s,x)=>s+x.amount,0);

  try{
    if(editingMealId){
      await updateDoc(doc(db,'meals',editingMealId), { date, note, payer, total, shares });
      toast('已更新訂餐紀錄');
      cancelEdit();
    }else{
      await addDoc(collection(db,'meals'), {
        date, note, payer, total, shares, createdAt: serverTimestamp()
      });
      toast('已儲存訂餐紀錄');
      $('mealNote').value = '';
      $('sharesList').innerHTML = '';
      addShareRow(); addShareRow();
    }
  }catch(e){
    alert('儲存失敗：'+e.message);
  }
}
window.submitMeal = submitMeal;

function editMeal(id){
  const meal = meals.find(m=>m.id===id);
  if(!meal) return;
  editingMealId = id;
  if(meal.payer) addMemberIfNew(meal.payer);
  (meal.shares||[]).forEach(s=>addMemberIfNew(s.name));
  $('mealDate').value = meal.date || '';
  $('mealNote').value = meal.note || '';
  $('payerSelect').value = meal.payer || '';
  $('sharesList').innerHTML = '';
  (meal.shares||[]).forEach(s=>addShareRow(s.name, s.amount));
  if((meal.shares||[]).length===0){ addShareRow(); addShareRow(); }
  $('submitBtn').textContent = '更新這筆訂餐';
  $('cancelEditBtn').classList.remove('hidden');
  switchTab('add');
  toast('編輯中：修改後按「更新這筆訂餐」');
}
window.editMeal = editMeal;

function cancelEdit(){
  editingMealId = null;
  $('mealDate').value = new Date().toISOString().slice(0,10);
  $('mealNote').value = '';
  $('sharesList').innerHTML = '';
  addShareRow(); addShareRow();
  $('submitBtn').textContent = '儲存這筆訂餐';
  $('cancelEditBtn').classList.add('hidden');
}
window.cancelEdit = cancelEdit;

// ---------- Live meals + balance calc ----------
function listenMeals(){
  const q = query(collection(db,'meals'), orderBy('createdAt','desc'));
  onSnapshot(q, (snap)=>{
    meals = snap.docs.map(d=>({id:d.id, ...d.data()}));
    renderHistory();
    renderBalance();
  }, (err)=>{
    toast('讀取失敗：'+err.message);
  });
}

async function deleteMeal(id){
  if(!confirm('確定要刪除這筆訂餐紀錄嗎？')) return;
  await deleteDoc(doc(db,'meals',id));
  toast('已刪除');
}
window.deleteMeal = deleteMeal;

// ---------- Settlements (mark as repaid) ----------
function listenSettlements(){
  const q = query(collection(db,'settlements'), orderBy('createdAt','desc'));
  onSnapshot(q, (snap)=>{
    settlements = snap.docs.map(d=>({id:d.id, ...d.data()}));
    renderSettleHistory();
    renderBalance();
  }, (err)=>{
    toast('讀取還款紀錄失敗：'+err.message);
  });
}

// PIN is stored in Firestore (shared by everyone), NOT localStorage —
// otherwise each person's browser would just set its own PIN on first use
// and the check would never actually stop anyone.
async function checkPin(){
  const ref = doc(db,'settings','settlePin');
  const snap = await getDoc(ref);
  const currentPin = snap.exists() ? snap.data().pin : '';
  if(!currentPin){
    const setup = prompt('尚未設定「還款確認碼」，請設定一組大家都知道的密碼（之後標記已還款／復原都需要輸入，避免有人亂按）：');
    if(!setup) return false;
    await setDoc(ref, { pin: setup });
    toast('確認碼已設定，記得告訴其他人這組密碼');
    return true;
  }
  const input = prompt('請輸入還款確認碼：');
  if(input === null) return false;
  if(input !== currentPin){ alert('確認碼錯誤，操作已取消'); return false; }
  return true;
}

async function changePin(){
  const ref = doc(db,'settings','settlePin');
  const snap = await getDoc(ref);
  const currentPin = snap.exists() ? snap.data().pin : '';
  if(currentPin){
    const input = prompt('請先輸入目前的確認碼：');
    if(input === null) return;
    if(input !== currentPin){ alert('確認碼錯誤'); return; }
  }
  const next = prompt('請輸入新的還款確認碼：');
  if(!next) return;
  await setDoc(ref, { pin: next });
  toast('確認碼已更新，記得告訴其他人新密碼');
}
window.changePin = changePin;

async function markRepaid(from, to, amount){
  if(!(await checkPin())) return;
  if(!confirm(`確定要標記「${from} 已還給 ${to} $${amount.toFixed(0)}」嗎？`)) return;
  try{
    await addDoc(collection(db,'settlements'), { from, to, amount, createdAt: serverTimestamp() });
    toast('已標記為還款完成');
  }catch(e){
    alert('操作失敗：'+e.message);
  }
}
function markRepaidFromBtn(btn){
  markRepaid(btn.dataset.from, btn.dataset.to, parseFloat(btn.dataset.amount));
}
window.markRepaidFromBtn = markRepaidFromBtn;

async function undoSettlement(id){
  if(!(await checkPin())) return;
  if(!confirm('確定要復原這筆還款紀錄嗎？（復原後會恢復欠款）')) return;
  await deleteDoc(doc(db,'settlements',id));
  toast('已復原');
}
window.undoSettlement = undoSettlement;

function renderSettleHistory(){
  const el = $('settleHistoryList');
  if(settlements.length===0){ el.innerHTML='<div class="empty">尚無還款紀錄</div>'; return; }
  el.innerHTML = settlements.map(s=>`
    <div class="meal-item">
      <div class="meal-title">
        <span>${s.from} → ${s.to} $${s.amount}</span>
        <button class="del-btn" onclick="undoSettlement('${s.id}')">復原</button>
      </div>
    </div>
  `).join('');
}

function renderHistory(){
  const el = $('historyList');
  if(meals.length===0){ el.innerHTML='<div class="empty">尚無紀錄</div>'; return; }
  el.innerHTML = meals.map(m=>`
    <div class="meal-item">
      <div class="meal-title">
        <span>${m.note || '（無備註）'} · $${m.total}</span>
        <span>
          <button class="del-btn" onclick="editMeal('${m.id}')">編輯</button>
          <button class="del-btn" onclick="deleteMeal('${m.id}')">刪除</button>
        </span>
      </div>
      <div class="meal-meta">${m.date || ''} · 代墊人：${m.payer}</div>
      <div class="meal-shares">
        ${(m.shares||[]).map(s=>`<span>${s.name} $${s.amount}</span>`).join('')}
      </div>
    </div>
  `).join('');
}

function renderBalance(){
  const balances = {}; // name -> net (positive = should receive money)
  const pair = {};     // pair[a][b] = amount a owes b (raw, pre-netting)
  const ensure = (n)=>{ if(!(n in balances)) balances[n]=0; };
  const ensurePair = (a,b)=>{ if(!pair[a]) pair[a]={}; if(!(b in pair[a])) pair[a][b]=0; };

  meals.forEach(m=>{
    ensure(m.payer);
    (m.shares||[]).forEach(s=>{
      ensure(s.name);
      if(s.name === m.payer) return; // payer's own share nets out
      balances[s.name] -= s.amount;   // they owe this much
      balances[m.payer] += s.amount;  // payer is owed this much
      ensurePair(s.name, m.payer);
      pair[s.name][m.payer] += s.amount;
    });
  });

  settlements.forEach(s=>{
    ensure(s.from); ensure(s.to);
    balances[s.from] += s.amount; // debtor already paid this back
    balances[s.to] -= s.amount;   // creditor already received it
    ensurePair(s.from, s.to);
    pair[s.from][s.to] -= s.amount;
  });

  // Net each pair down to a single direction (A owes B, or B owes A, not both)
  const names = Object.keys(balances);
  const netPairs = []; // {from, to, amount}
  for(let i=0;i<names.length;i++){
    for(let j=i+1;j<names.length;j++){
      const a=names[i], b=names[j];
      const aOwesB = (pair[a] && pair[a][b]) || 0;
      const bOwesA = (pair[b] && pair[b][a]) || 0;
      const net = aOwesB - bOwesA;
      if(net > 0.5) netPairs.push({from:a, to:b, amount:net});
      else if(net < -0.5) netPairs.push({from:b, to:a, amount:-net});
    }
  }

  const el = $('balanceList');
  if(names.length===0){ el.innerHTML='<div class="empty">尚無資料</div>'; return; }

  const summaryHtml = names.sort((a,b)=>balances[b]-balances[a]).map(n=>{
    const v = balances[n];
    const cls = v>0.5?'amt-pos':(v<-0.5?'amt-neg':'amt-zero');
    const label = v>0.5?`該收 $${v.toFixed(0)}`:(v<-0.5?`該付 $${Math.abs(v).toFixed(0)}`:'已結清');
    return `<div class="b-row"><span>${n}</span><span class="${cls}">${label}</span></div>`;
  }).join('');

  let detailHtml;
  if(netPairs.length===0){
    detailHtml = '<div class="empty">目前沒有人欠錢</div>';
  }else{
    // group by debtor, list who they owe how much
    const byDebtor = {};
    netPairs.forEach(p=>{
      if(!byDebtor[p.from]) byDebtor[p.from]=[];
      byDebtor[p.from].push(p);
    });
    detailHtml = Object.keys(byDebtor).map(debtor=>`
      <div class="b-row" style="display:block;">
        <div style="font-weight:700;margin-bottom:4px;">${debtor}</div>
        ${byDebtor[debtor].map(p=>`
          <div style="display:flex;justify-content:space-between;align-items:center;padding-left:12px;gap:8px;">
            <span style="font-size:14px;color:var(--neg);">→ 欠 ${p.to} $${p.amount.toFixed(0)}</span>
            <button class="small secondary" style="flex-shrink:0;width:auto;" data-from="${debtor}" data-to="${p.to}" data-amount="${p.amount}" onclick="markRepaidFromBtn(this)">標記已還款</button>
          </div>
        `).join('')}
      </div>
    `).join('');
  }

  el.innerHTML = `
    <div style="font-size:13px;font-weight:700;color:var(--muted);margin-bottom:6px;">總覽（每人淨額）</div>
    ${summaryHtml}
    <div style="font-size:13px;font-weight:700;color:var(--muted);margin:16px 0 6px;">誰欠誰（已互相抵銷）</div>
    ${detailHtml}
  `;
}

// ---------- Tabs ----------
window.switchTab = function(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===name));
  ['add','balance','history'].forEach(t=>{
    $('tab-'+t).classList.toggle('hidden', t!==name);
  });
};
</script>
